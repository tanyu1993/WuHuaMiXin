<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>物华弥新：状态校准中心 (V3.1 - BugFix)</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; display: flex; height: 100vh; color: #1a1a1a; }
        #sidebar { width: 260px; background: #1a1c2c; color: #fff; padding: 20px; overflow-y: auto; box-shadow: 2px 0 10px rgba(0,0,0,0.1); }
        #content { flex: 1; padding: 30px; overflow-y: auto; background: #fdfdfd; }
        .tag-btn { display: block; padding: 10px 15px; margin: 6px 0; background: #2d3047; border-radius: 6px; cursor: pointer; color: #c0c4d1; font-size: 14px; transition: all 0.2s; border-left: 3px solid transparent; }
        .tag-btn:hover { background: #3d415e; color: #fff; border-left-color: #4ecca3; }
        .tag-btn.active { background: #4ecca3; color: #1a1c2c; border-left-color: #fff; font-weight: bold; }
        
        .card { background: #fff; border-radius: 12px; padding: 20px; margin-bottom: 20px; border-left: 8px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .card.is-verified { border-left-color: #2ecc71 !important; background: #f0fff4; }
        .card.cat1 { border-left-color: #3498db; }
        .card.cat2, .card.cat3 { border-left-color: #e74c3c; }
        .card.cat5 { border-left-color: #9b59b6; }
        
        .s-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .s-name { font-weight: 700; font-size: 20px; color: #2c3e50; }
        .s-owner { font-size: 13px; color: #95a5a6; background: #f1f3f5; padding: 2px 8px; border-radius: 4px; }
        .s-desc { background: #f8f9fa; padding: 15px; border-radius: 8px; font-size: 15px; color: #34495e; line-height: 1.7; margin-bottom: 15px; }
        
        .verify-btn { position: absolute; top: 20px; right: 20px; padding: 6px 15px; border-radius: 6px; border: 1px solid #2ecc71; background: #fff; color: #2ecc71; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .verify-btn.active { background: #2ecc71; color: #fff; }

        .tag-editor { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .badge { background: #e8f0fe; color: #1a73e8; border-radius: 6px; padding: 4px 10px; font-size: 13px; font-weight: 500; border: 1px solid #d2e3fc; display: flex; align-items: center; }
        .tag-del { margin-left: 6px; cursor: pointer; color: #ff7675; font-weight: bold; font-size: 14px; }
        .tag-del:hover { color: #d63031; }
        
        .add-tag-input { border: 1px dashed #ccc; border-radius: 6px; padding: 4px 8px; font-size: 12px; width: 100px; outline: none; }
        .add-tag-btn { cursor: pointer; color: #4ecca3; font-weight: bold; font-size: 18px; margin-left: 5px; }
        
        .locked-label { font-size: 11px; color: #2ecc71; margin-left: 10px; font-weight: bold; }
        h2 { margin-top: 0; color: #2d3436; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .count-tag { font-size: 0.6em; vertical-align: middle; background: #ff7675; color: white; padding: 2px 6px; border-radius: 10px; margin-left: 5px; }
    </style>
</head>
<body>
    <div id="sidebar">
        <h3 style="color: #4ecca3; margin-bottom: 25px;">战术标签库</h3>
        <div id="tags-container"></div>
    </div>
    <div id="content">
        <h2>状态校准中心 V3.1 <small style="color: #999;">- 总计: <span id="count"></span> 条</small></h2>
        <div id="cards-container"></div>
    </div>

    <script src="status_data.js"></script>
    <script>
        const tagsCont = document.getElementById('tags-container');
        const cardsCont = document.getElementById('cards-container');
        const countSpan = document.getElementById('count');

        // 核心同步函数
        async function syncUpdate(name, data) {
            try {
                const response = await fetch('/api/verify_status', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ name: name, ...data })
                });
                return response.ok;
            } catch (e) { 
                alert('网络异常，请确保 Flask 服务器已启动'); 
                return false;
            }
        }

        // 修复后的点击函数，不再依赖传参，而是依赖内存对象状态
        async function toggleVerify(name, btn) {
            const target = STATUS_DATA.find(s => s.name === name);
            if(!target) return;
            
            const newVerified = !target.verified;
            const ok = await syncUpdate(name, { verified: newVerified });
            if (ok) {
                target.verified = newVerified;
                btn.closest('.card').classList.toggle('is-verified', newVerified);
                btn.classList.toggle('active', newVerified);
                btn.innerText = newVerified ? '✅ 已锁定' : '✅ 固化';
                
                // 更新卡片内的熔断标签
                const label = btn.closest('.card').querySelector('.locked-label');
                if(newVerified && !label) {
                    btn.closest('.card').querySelector('.s-name').insertAdjacentHTML('beforeend', '<span class="locked-label">[引擎已熔断]</span>');
                } else if(!newVerified && label) {
                    label.remove();
                }
            }
        }

        async function deleteTag(statusName, tagName) {
            const status = STATUS_DATA.find(s => s.name === statusName);
            if(!status) return;
            const newTags = status.tags.filter(t => t !== tagName);
            const ok = await syncUpdate(statusName, { tags: newTags });
            if(ok) {
                status.tags = newTags;
                renderCurrent();
            }
        }

        async function addTag(statusName, inputEl) {
            const tagName = inputEl.value.trim();
            if(!tagName) return;
            const status = STATUS_DATA.find(s => s.name === statusName);
            if(!status) return;
            if(status.tags.includes(tagName)) return;
            
            const newTags = [...status.tags, tagName];
            const ok = await syncUpdate(statusName, { tags: newTags });
            if(ok) {
                status.tags = newTags;
                inputEl.value = '';
                renderCurrent();
            }
        }

        let currentFilter = null;
        function renderCurrent() {
            show(currentFilter);
            refreshSidebar();
        }

        function refreshSidebar() {
            const tagsMap = new Map();
            STATUS_DATA.forEach(s => {
                s.tags.forEach(t => tagsMap.set(t, (tagsMap.get(t) || 0) + 1));
            });
            
            tagsCont.innerHTML = '';
            const allBtn = document.createElement('div');
            allBtn.className = 'tag-btn ' + (currentFilter === null ? 'active' : '');
            allBtn.innerHTML = '显示全部 <span class="count-tag">' + STATUS_DATA.length + '</span>';
            allBtn.onclick = () => show(null);
            tagsCont.appendChild(allBtn);

            Array.from(tagsMap.keys()).sort().forEach(t => {
                const btn = document.createElement('div');
                btn.className = 'tag-btn ' + (currentFilter === t ? 'active' : '');
                btn.innerHTML = `${t} <span class="count-tag">${tagsMap.get(t)}</span>`;
                btn.onclick = () => show(t);
                tagsCont.appendChild(btn);
            });
        }

        function show(selectedTag) {
            currentFilter = selectedTag;
            cardsCont.innerHTML = '';
            let c = 0;
            STATUS_DATA.forEach(s => {
                if (selectedTag && !s.tags.includes(selectedTag)) return;
                c++;
                const card = document.createElement('div');
                card.className = 'card cat' + s.cat + (s.verified ? ' is-verified' : '');
                card.innerHTML = `
                    <div class="s-header">
                        <div class="s-name">${s.name} ${s.verified ? '<span class="locked-label">[引擎已熔断]</span>' : ''}</div>
                        <div class="s-owner">${s.owner}</div>
                    </div>
                    <button class="verify-btn ${s.verified ? 'active' : ''}" onclick="toggleVerify('${s.name}', this)">
                        ${s.verified ? '✅ 已锁定' : '✅ 固化'}
                    </button>
                    <div class="s-desc">${s.desc.replace(/\n/g, '<br>')}</div>
                    <div class="tag-editor">
                        ${s.tags.map(t => `
                            <span class="badge">${t}<span class="tag-del" onclick="deleteTag('${s.name}', '${t}')">×</span></span>
                        `).join('')}
                        <input type="text" class="add-tag-input" placeholder="新标签..." onkeyup="if(event.keyCode==13) addTag('${s.name}', this)">
                        <span class="add-tag-btn" onclick="addTag('${s.name}', this.previousElementSibling)">+</span>
                    </div>
                `;
                cardsCont.appendChild(card);
            });
            countSpan.innerText = c;
        }

        renderCurrent();
    </script>
</body>
</html>
