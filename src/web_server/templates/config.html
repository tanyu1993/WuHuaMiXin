<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>估值模型配置 - 物华弥新评估</title>
    <style>
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f0f2f5; margin: 0; padding: 40px; color: #1a1a1a; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.05); }
        h1 { margin-bottom: 30px; display: flex; align-items: center; gap: 15px; }
        h1::before { content: '⚙️'; font-size: 0.8em; }
        
        .section { margin-bottom: 40px; border-bottom: 1px solid #eee; padding-bottom: 30px; }
        .section h2 { font-size: 1.2rem; color: #3498db; margin-bottom: 20px; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .field { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; font-size: 0.9rem; color: #666; }
        input[type="number"], input[type="text"] { 
            padding: 12px; border: 2px solid #eef; border-radius: 12px; font-size: 1rem; outline: none; transition: 0.2s; 
        }
        input:focus { border-color: #3498db; background: #f8fbff; }

        .btn-group { margin-top: 40px; display: flex; gap: 15px; }
        .btn { padding: 15px 40px; border-radius: 14px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        .btn-save { background: #3498db; color: white; flex: 1; }
        .btn-save:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3); }
        .btn-back { background: #eee; color: #777; text-decoration: none; display: flex; align-items: center; padding: 0 30px; }
        
        .badge { background: #f0f2f5; padding: 4px 10px; border-radius: 6px; font-size: 0.8em; color: #999; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>估值模型配置 <span class="badge">V6.0 Core</span></h1>
        
        <form id="configForm">
            <div class="section">
                <h2>📊 核心单位价值 (PU)</h2>
                <div class="grid">
                    <div class="field">
                        <label>单抽市场价 (RMB)</label>
                        <input type="number" step="0.01" name="PULL_MARKET_VALUE" value="{{PULL_MARKET_VALUE}}">
                    </div>
                    <div class="field">
                        <label>单红平均期望 (Pull/Red)</label>
                        <input type="number" name="EXPECTED_PULLS_PER_RED" value="{{EXPECTED_PULLS_PER_RED}}">
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>🔥 强度系数权重</h2>
                <div class="grid">
                    {% for tier, weight in STRENGTH_WEIGHTS.items() %}
                    <div class="field">
                        <label>强度 {{ tier }}</label>
                        <input type="number" step="0.1" name="STRENGTH_WEIGHTS_{{tier}}" value="{{weight}}">
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="section">
                <h2>✨ 致知 (命座) 价值增幅</h2>
                <div class="grid" style="grid-template-columns: repeat(4, 1fr);">
                    {% for zz, weight in ZHIZHI_COST_WEIGHT.items() %}
                    <div class="field">
                        <label>{{ zz }}致知</label>
                        <input type="number" step="0.1" name="ZHIZHI_COST_WEIGHT_{{zz}}" value="{{weight}}">
                    </div>
                    {% endfor %}
                </div>
            </div>

            <div class="section">
                <h2>🛠️ 修正与调节系数</h2>
                <div class="grid">
                    <div class="field">
                        <label>限定溢价倍率 (LIMITED_PREMIUM)</label>
                        <input type="number" step="0.1" name="LIMITED_PREMIUM" value="{{LIMITED_PREMIUM}}">
                    </div>
                    <div class="field">
                        <label>缺失限定惩罚 (0.5=单只打5折)</label>
                        <input type="number" step="0.01" name="MISSING_LIMITED_PENALTY" value="{{MISSING_LIMITED_PENALTY}}">
                    </div>
                    <div class="field">
                        <label>每版本贬值速率 (DECAY_RATE_PER_ORDER)</label>
                        <input type="number" step="0.001" name="DECAY_RATE_PER_ORDER" value="{{DECAY_RATE_PER_ORDER}}">
                    </div>
                    <div class="field">
                        <label>最大贬值下限 (DECAY_FLOOR)</label>
                        <input type="number" step="0.01" name="DECAY_FLOOR" value="{{DECAY_FLOOR}}">
                    </div>
                </div>
            </div>

            <div class="section">
                <h2>💎 额外资源价值参数 (Resource Valuation)</h2>
                <div class="grid">
                    <div class="field">
                        <label>活资源溢价系数 (LIVE_RESOURCE_BONUS)</label>
                        <input type="number" step="0.1" name="LIVE_RESOURCE_BONUS" value="{{LIVE_RESOURCE_BONUS or 1.2}}">
                    </div>
                    <div class="field">
                        <label>一张红卡折合抽数 (RED_CARD_TO_PULLS)</label>
                        <input type="number" step="0.1" name="RED_CARD_TO_PULLS" value="{{RED_CARD_TO_PULLS or 8.6}}">
                    </div>
                    <div class="field">
                        <label>月卡每日价值 (DAILY_MONTHLY_CARD_VAL)</label>
                        <input type="number" step="0.01" name="DAILY_MONTHLY_CARD_VAL" value="{{DAILY_MONTHLY_CARD_VAL or 0.8}}">
                    </div>
                </div>
            </div>

            <div class="btn-group">
                <a href="/" class="btn btn-back">返回首页</a>
                <button type="button" class="btn btn-save" onclick="saveConfig()">保存并立即应用</button>
            </div>
        </form>
    </div>

    <script>
        async function saveConfig() {
            const formData = new FormData(document.getElementById('configForm'));
            const data = {
                STRENGTH_WEIGHTS: {},
                ZHIZHI_COST_WEIGHT: {}
            };
            
            for (let [key, value] of formData.entries()) {
                if (key.startsWith('STRENGTH_WEIGHTS_')) {
                    data.STRENGTH_WEIGHTS[key.replace('STRENGTH_WEIGHTS_', '')] = parseFloat(value);
                } else if (key.startsWith('ZHIZHI_COST_WEIGHT_')) {
                    data.ZHIZHI_COST_WEIGHT[key.replace('ZHIZHI_COST_WEIGHT_', '')] = parseFloat(value);
                } else {
                    data[key] = parseFloat(value);
                }
            }
            
            const res = await fetch('/config', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });
            
            if (res.ok) {
                alert('配置保存成功！');
                window.location.reload();
            } else {
                alert('保存失败，请检查控制台。');
            }
        }
    </script>
</body>
</html>
