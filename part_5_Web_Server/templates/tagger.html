<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <title>物华弥新 状态语义打标</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #f4f4f9; }
        .card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
        .btn-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        button { padding: 15px; cursor: pointer; border: none; border-radius: 4px; background: #007bff; color: white; font-weight: bold; }
        button:hover { background: #0056b3; }
        pre { background: #eee; padding: 10px; font-size: 12px; white-space: pre-wrap; }
    </style>
</head>
<body>
    <div class="card" id="app">
        <h2 id="char-name">加载中...</h2>
        <p><strong>状态:</strong> <span id="s-name" style="color: #d9534f; font-weight: bold;"></span></p>
        <p><strong>描述:</strong> <span id="s-desc"></span></p>
        <p><strong>触发技能上下文:</strong></p>
        <pre id="s-context"></pre>
        <div id="hint" style="text-align: center; color: #5bc0de; font-weight: bold; margin: 10px;"></div>
        <div class="btn-group">
            {% for k, v in categories.items() %}
            <button onclick="tag('{{k}}')" id="btn-{{k}}">{{v}} ({{k}})</button>
            {% endfor %}
        </div>
    </div>
    <script>
        let current = null;
        async function load() {
            const res = await fetch('/next');
            current = await res.json();
            if (!current) { alert('全部打标完毕！'); return; }
            document.getElementById('char-name').innerText = `处理器者: ${current.char}`;
            document.getElementById('s-name').innerText = current.name;
            document.getElementById('s-desc').innerText = current.description;
            document.getElementById('s-context').innerText = current.context;
            
            const hint = document.getElementById('hint');
            
            // 清除之前的边框高亮
            document.querySelectorAll('.btn-group button').forEach(btn => btn.style.border = "none");
            
            if (current.suggested) {
                hint.innerText = `💡 推荐分类: ${current.suggested}`;
                const suggestedBtn = document.getElementById(`btn-${current.suggested}`);
                if (suggestedBtn) suggestedBtn.style.border = "3px solid #f0ad4e";
            } else {
                hint.innerText = "";
            }
        }
        async function tag(cat) {
            console.log("Tagging:", current.name, "with category:", cat);
            try {
                const response = await fetch('/tag', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({name: current.name, desc: current.description, cat: cat})
                });
                const result = await response.json();
                console.log("Tagging result:", result);
                load();
            } catch (error) {
                console.error("Tagging error:", error);
            }
        }
        window.onkeydown = (e) => {
            if (e.key >= '1' && e.key <= '7') tag(e.key);
        };
        load();
    </script>
</body>
</html>
